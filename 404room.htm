<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>物件コード：404号室 - 内見</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div id="hotspots-container"></div>
    <div id="peripheral-container"></div>
    <div id="flicker-overlay"></div>
    <div id="darkness-overlay"></div>
    
    <div id="hands-container">
        <img id="right-hand" class="creeping-hand" src="migite.png" alt="">
        <img id="left-hand" class="creeping-hand" src="hidarite.png" alt="">
    </div>
    
    <div id="mitana-overlay">
        <div class="blood-vignette" id="blood-vignette"></div>
        <div class="mirror-flash" id="mirror-flash"></div>
    </div>
    
    <div id="glitch-overlay">
        <div class="scanlines"></div>
        <div class="flicker"></div>
        <div class="rgb-shift"></div>
        <div class="block-glitch"></div>
        <div class="vignette-pulse"></div>
    </div>
    
    <div id="horror-overlay">
        <div id="static-noise"></div>
        <div class="heavy-noise"></div>
        <div id="final-face">
            <div class="face-slice slice-1"><img src="noizunoonnna (2).png" alt=""></div>
            <div class="face-slice slice-2"><img src="noizunoonnna (2).png" alt=""></div>
            <div class="face-slice slice-3"><img src="noizunoonnna (2).png" alt=""></div>
            <div class="face-slice slice-4"><img src="noizunoonnna (2).png" alt=""></div>
            <div class="face-slice slice-5"><img src="noizunoonnna (2).png" alt=""></div>
            <div class="face-slice slice-6"><img src="noizunoonnna (2).png" alt=""></div>
            <div class="face-slice slice-7"><img src="noizunoonnna (2).png" alt=""></div>
            <div class="face-slice slice-8"><img src="noizunoonnna (2).png" alt=""></div>
        </div>
    </div>

    <div id="ui">
        <div id="title">物件コード：404</div>
        <div id="room-name">読み込み中...</div>
        <div id="sequence-indicator">[ シーケンス：<span id="seq-count">0</span>/7 ]</div>
    </div>
    <div id="loading">パノラマを読み込み中...</div>
    <div id="controls">
    <span id="controls-text"></span>
    </div>
    <script>
    const isMobile = ('ontouchstart' in window);
    document.getElementById('controls-text').innerHTML = isMobile
    ? '1本指ドラッグ：視点変更　2本指：ズーム　赤い丸タップ：移動'
    : 'マウスドラッグ：視点変更　スクロール：ズーム　赤い丸クリック：移動';
    </script>

    <!-- スクリプト読み込み（順序重要！） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/systems/TimeManager.js"></script>
    <script src="js/systems/SequenceManager.js"></script>
    <script src="js/systems/PeripheralVisionSystem.js"></script>
    <script src="js/systems/LightFlickerSystem.js"></script>
    <script src="js/systems/TextCorruption.js"></script>
    <script src="js/systems/GazeSystem.js"></script>
    <script src="js/systems/MitanaSystem.js"></script>
    <script src="js/systems/BathroomNightmareSystem.js"></script>
    <script src="js/systems/KurokoSystem.js"></script>  <!-- ← main.jsの前に移動！ -->
    <script src="js/systems/BlueRoomSystem.js"></script>  <!-- ★★★ 青の部屋システム ★★★ -->
    <script src="js/main.js"></script>
    
    <!-- 最終ジャンプスケア用オーバーレイ（bodyの最後に追加） -->
 <div id="final-jumpscare" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 99999;
    display: none;
    pointer-events: none;
    background: #000;
 ">
    <img id="jumpscare-image" src="" alt="" style="
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        opacity: 0;
        transform: scale(1.1);
        transition: all 0.1s ease-out;
     ">
</div>
</body>
</html>
