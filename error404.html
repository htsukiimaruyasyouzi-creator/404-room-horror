<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Courier New", monospace;
            background: #000;
            color: #e60012;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            animation: flicker 0.15s infinite;
        }
        
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.95; }
        }
        
        .container {
            text-align: center;
            line-height: 2;
            text-shadow: 0 0 20px rgba(230, 0, 18, 0.8);
            animation: glitch 2s infinite;
        }
        
        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }
        
        h1 {
            font-size: 72px;
            margin-bottom: 20px;
            letter-spacing: 5px;
        }
        
        p {
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        .message {
            margin-top: 40px;
            font-size: 14px;
            color: #888;
            opacity: 0.8;
        }
        
        .blink {
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>ページが見つかり��せん</p>
        <p>This page cannot be found</p>
        <div class="message">
            <p>ERROR: youaretrapped</p>
            <p class="blink">■ ■ ■</p>
        </div>
    </div>
</body>
</html>
